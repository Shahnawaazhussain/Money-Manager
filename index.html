<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Buddy</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Links -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Icon Links -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <Header class="main-header">
        <div class="header-container">
            <h1 class="logo">Expense Buddy</h1>
            <button id="open-modal-btn" class="btn-primary">
                <span class="material-symbols-outlined">add</span> Add Transaction
            </button>
        </div>
    </Header>

    <!-- Cards Section -->
    <main class="dashboard-container">
        <section class="summary-grid">
            <div class="card income-card">
                <div class="card-header">
                    <p class="label">Total Income</p>
                    <span class="material-symbols-outlined icon-bg">trending_up</span>
                </div>
                <h2 id="total-income">$0.00</h2>
            </div>
            <div class="card expense-card">
                <div class="card-header">
                    <p class="label">Total Expense</p>
                    <span class="material-symbols-outlined icon-bg">trending_down</span>
                </div>
                <h2 id="total-expense">$0.00</h2>
            </div>
            <div class="card balance-card">
                <div class="card-header">
                    <p class="label">Net Balance</p>
                    <span class="material-symbols-outlined icon-bg">account_balance_wallet</span>
                </div>
                <h2 id="net-balance">$0.00</h2>
            </div>
        </section>

        <!-- Filters & Sorting -->
        <section class="filter-bar">
            <div class="filter-group">
                <select id="filter-type">
                    <option value="all">All Transactions</option>
                    <option value="income">Income Only</option>
                    <option value="expense">Expense Only</option>
                </select>
                <select id="sort-by">
                    <option value="date-desc">Newest First</option>
                    <option value="date-asc">Oldest First</option>
                    <option value="amount-high">Highest Amount</option>
                    <option value="amount-low">Lowest Amount</option>
                </select>
            </div>
        </section>

        <section class="table-container">
            <div class="table-responsive">
                <table class="transaction-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th class="text-right">Amount</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="transaction-rows"></tbody>
            </table>
            </div>          
        </section>
    </main>

    <div id="modal-overlay" class="modal-hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">New Transaction</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <form id="transaction-form">
                <input type="hidden" id="edit-id">
                
                <div class="type-toggle">
                    <label class="toggle-option">
                        <input type="radio" name="type" value="income" checked>
                        <span>Income</span>
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="type" value="expense">
                        <span>Expense</span>
                    </label>
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="form-amount" step="0.01" placeholder="0.00">
                    <span id="amount-error" class="error-text"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="form-date">
                        <span id="date-error" class="error-text"></span>
                    </div>
                    <div class="form-group">
                        <label>Sub-Category</label>
                        <select id="form-category"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="form-desc" maxlength="100" placeholder="Max 100 characters"></textarea>
                </div>

                <button type="submit" class="btn-submit">Save Transaction</button>
            </form>
        </div>
    </div>

    
    <!-- JavaScript Link -->
    <script src="script.js"></script>
</body>
</html>
